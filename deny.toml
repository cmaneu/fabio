[advisories]
ignore = []

[bans]
deny = [
    # Unmaintained (RUSTSEC-2025-0134). Use rustls-pki-types PemObject trait instead.
    { crate = "rustls-pemfile", reason = "archived/unmaintained — use rustls-pki-types >= 1.9 (PemObject trait)" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]
