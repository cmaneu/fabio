# prek configuration - https://prek.j178.dev
# A faster, Rust-native drop-in replacement for pre-commit

[auto_update]
cooldown_days = 3

# General file hygiene (runs natively in Rust, no network or Python needed)
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=500"] },
]

# Secret detection (uses existing .gitleaks.toml)
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [{ id = "gitleaks" }]

# Rust tooling (local hooks using system cargo)
[[repos]]
repo = "local"

[[repos.hooks]]
id = "rustfmt"
name = "rustfmt"
entry = "cargo fmt -- --check"
language = "system"
types = ["rust"]
pass_filenames = false
priority = 0

[[repos.hooks]]
id = "clippy"
name = "clippy"
entry = "cargo clippy --tests -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false
priority = 1
