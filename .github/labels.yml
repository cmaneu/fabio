# Repository labels — managed as code
# Apply with: npx github-label-sync --labels .github/labels.yml iemejia/fabio
# Or manually: yq -r '.[] | "\(.name)\t\(.color)\t\(.description)"' .github/labels.yml | while IFS=$'\t' read -r n c d; do gh label create "$n" --color "$c" --description "$d" --force; done
- name: bug
  color: "d73a4a"
  description: "Something isn't working"
- name: documentation
  color: "0075ca"
  description: "Improvements or additions to documentation"
- name: duplicate
  color: "cfd3d7"
  description: "This issue or pull request already exists"
- name: enhancement
  color: "a2eeef"
  description: "New feature or request"
- name: help wanted
  color: "008672"
  description: "Extra attention is needed"
- name: good first issue
  color: "7057ff"
  description: "Good for newcomers"
- name: invalid
  color: "e4e669"
  description: "This doesn't seem right"
- name: question
  color: "d876e3"
  description: "Further information is requested"
- name: wontfix
  color: "ffffff"
  description: "This will not be worked on"
- name: api-sync
  color: "1D76DB"
  description: "Synced from Fabric REST API specs"
- name: automated
  color: "0E8A16"
  description: "Automated by GitHub Actions"
