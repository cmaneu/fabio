name: Test Auth Methods

on:
  workflow_dispatch:
    inputs:
      method:
        description: "Auth method to test"
        required: true
        type: choice
        options:
          - both
          - oidc
          - client-secret

permissions:
  id-token: write
  contents: read

jobs:
  oidc:
    if: inputs.method == 'both' || inputs.method == 'oidc'
    name: "OIDC / ${{ matrix.artifact }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: fabio-linux-x64
          - os: ubuntu-24.04-arm
            artifact: fabio-linux-arm64
          - os: macos-latest
            artifact: fabio-macos-arm64
          - os: windows-latest
            artifact: fabio-windows-x64
          - os: windows-11-arm
            artifact: fabio-windows-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Install fabio (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL "https://github.com/iemejia/fabio/releases/latest/download/${{ matrix.artifact }}.tar.gz" \
            | tar -xz -C /usr/local/bin
          fabio --version

      - name: Install fabio (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/iemejia/fabio/releases/latest/download/${{ matrix.artifact }}.zip" -OutFile fabio.zip
          Expand-Archive fabio.zip -DestinationPath "$env:USERPROFILE\.local\bin"
          echo "$env:USERPROFILE\.local\bin" | Out-File -Append $env:GITHUB_PATH
          & "$env:USERPROFILE\.local\bin\fabio.exe" --version

      - name: Test auth status
        run: fabio auth status

      - name: Test workspace list
        run: fabio workspace list --limit 1

  client-secret:
    if: inputs.method == 'both' || inputs.method == 'client-secret'
    name: "Secret / ${{ matrix.artifact }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: fabio-linux-x64
          - os: ubuntu-24.04-arm
            artifact: fabio-linux-arm64
          - os: macos-latest
            artifact: fabio-macos-arm64
          - os: windows-latest
            artifact: fabio-windows-x64
          - os: windows-11-arm
            artifact: fabio-windows-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install fabio (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL "https://github.com/iemejia/fabio/releases/latest/download/${{ matrix.artifact }}.tar.gz" \
            | tar -xz -C /usr/local/bin
          fabio --version

      - name: Install fabio (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/iemejia/fabio/releases/latest/download/${{ matrix.artifact }}.zip" -OutFile fabio.zip
          Expand-Archive fabio.zip -DestinationPath "$env:USERPROFILE\.local\bin"
          echo "$env:USERPROFILE\.local\bin" | Out-File -Append $env:GITHUB_PATH
          & "$env:USERPROFILE\.local\bin\fabio.exe" --version

      - name: Test auth status
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: fabio auth status

      - name: Test workspace list
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: fabio workspace list --limit 1
