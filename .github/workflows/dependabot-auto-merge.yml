name: Dependabot Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge for clean Dependabot PRs
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            if (pullRequest.draft) {
              core.info('Skipping draft Dependabot pull request.');
              return;
            }

            if (pullRequest.mergeable_state !== 'clean') {
              core.info(
                `Skipping pull request #${pull_number}; mergeable_state=${pullRequest.mergeable_state}.`
              );
              return;
            }

            await github.graphql(
              `
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: { pullRequestId: $pullRequestId, mergeMethod: REBASE }
                  ) {
                    clientMutationId
                  }
                }
              `,
              {
                pullRequestId: pullRequest.node_id,
              }
            );

            core.info(`Enabled auto-merge for pull request #${pull_number}.`);
