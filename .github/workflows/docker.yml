name: Docker

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/docker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  devcontainer:
    name: Build & push devcontainer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      # devcontainers/ci builds multi-platform (amd64+arm64) and uses the OCI
      # exporter for layer caching. Both require a buildx builder on the
      # docker-container driver; the default `docker` driver supports neither.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3
        with:
          imageName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-devcontainer
          platform: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && 'always' || 'never' }}
          runCmd: |
            rustc --version
            cargo --version
            zig version
            git-cliff --version
            cargo zigbuild --version
            cargo xwin --version
            cargo audit --version
