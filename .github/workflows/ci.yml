name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os:
          - ubuntu-latest
          - macos-latest     # ARM64 (Apple Silicon)
          - macos-13         # x64 (Intel)
          - windows-latest   # x64

    runs-on: ${{ matrix.os }}
    name: >-
      ${{ matrix.os }} / py${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install ODBC Driver (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install ODBC Driver (macOS)
        if: runner.os == 'macOS'
        run: |
          brew tap microsoft/mssql-release https://github.com/Microsoft/homebrew-mssql-release
          brew update
          HOMEBREW_ACCEPT_EULA=Y brew install msodbcsql18

      - name: Install ODBC Driver (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install sqlserver-odbcdriver --yes --no-progress

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Run tests
        run: pytest --tb=short -q
