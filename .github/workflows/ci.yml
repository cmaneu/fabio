name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon) - macos-latest is arm64
          - os: macos-latest
            python-version: "3.11"
            arch: arm64
          - os: macos-latest
            python-version: "3.12"
            arch: arm64
          - os: macos-latest
            python-version: "3.13"
            arch: arm64
          # macOS x64 (Intel) - macos-13 is the last Intel runner
          - os: macos-13
            python-version: "3.11"
            arch: x64
          - os: macos-13
            python-version: "3.12"
            arch: x64
          - os: macos-13
            python-version: "3.13"
            arch: x64
          # Windows x64
          - os: windows-latest
            python-version: "3.11"
            arch: x64
          - os: windows-latest
            python-version: "3.12"
            arch: x64
          - os: windows-latest
            python-version: "3.13"
            arch: x64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / py${{ matrix.python-version }} / ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ODBC Driver (macOS)
        if: runner.os == 'macOS'
        run: |
          brew tap microsoft/mssql-release https://github.com/Microsoft/homebrew-mssql-release
          brew update
          HOMEBREW_ACCEPT_EULA=Y brew install msodbcsql18

      - name: Install ODBC Driver (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install sqlserver-odbcdriver --yes --no-progress

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Run tests
        run: pytest --tb=short -q

  lint:
    runs-on: ubuntu-latest
    name: lint / ubuntu / py3.13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ODBC Driver
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Mypy
        run: mypy src/

      - name: Run tests
        run: pytest --tb=short -q
