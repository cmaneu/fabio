name: Bug Report
description: Report a bug in fabio CLI
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Fabio Version
      description: Output of `fabio --version`
      placeholder: "fabio 0.4.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      description: The full command that triggered the bug
      placeholder: "fabio lakehouse upload --workspace ... --id ... --source '*.csv' --dest Files/"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include the full JSON error output if available.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context (capacity SKU, workspace region, error code, etc.)
    validations:
      required: false
